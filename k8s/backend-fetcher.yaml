apiVersion: batch/v1
kind: CronJob
metadata:
  name: fetcher
spec:
  schedule: "0 */12 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backend-fetcher
              image: cauaosp/role-fortal-backend:v1.1
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - name: data-volume
                  mountPath: /app/data
              command:
                - python
                - fetch_articles.py
          volumes:
            - name: data-volume
              persistentVolumeClaim:
                claimName: data-pvc
          restartPolicy: OnFailure
