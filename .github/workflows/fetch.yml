name: Atualizar Artigos

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */12 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verificar arquivos
        run: |
          pwd
          ls -la
          ls -la backend || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -r backend/requirements.txt

      - name: Executar fetcher
        run: |
          cd backend
          python fetch_articles.py

      - name: Copiar json para docs
        run: |
          mkdir -p docs
          cp backend/data/artigos_ceara.json docs/artigos.json

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add docs/artigos.json
          git commit -m "Atualiza artigos" || exit 0
          git push
